<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Project | BuildSmart GH</title>

<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="premium.css">
<link rel="icon" href="data:,">
</head>

<body>

<header class="main-header">
  <h1>BuildSmart GH</h1>
  <p>Start Your Building Project</p>
</header>

<main class="form-page">

  <div class="form-card">

    <h2>Create Project</h2>
    <p class="form-subtext">
      Give your project a name to begin planning and estimation.
    </p>

    <form id="projectForm">

      <input 
        type="text" 
        id="projectName" 
        placeholder="e.g. My 5 Bedroom House"
        required
      >

      <button type="submit">
        Continue to Estimate →
      </button>

    </form>

  </div>

</main>

<!-- JavaScript -->
<script src="script.js"></script>

</body>

</html>
